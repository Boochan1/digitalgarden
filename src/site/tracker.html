<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM Server Monitor | blindmouse.au</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --container-bg: #2b2b2b;
            --input-bg: #1e1e1e;
            --text-main: #ebebeb;
            --text-dim: #919191;
            --accent-blue: #1f538d;
            --accent-hover: #14375e;
            --border-color: #3f3f3f;
            --success-green: #50fa7b;
            --error-red: #ff5555;
        }
/* Change the body background to transparent */
        body {
            background-color: transparent; /* This lets the Quartz background show through */
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 0; /* Reduced padding to fit better in the iframe */
            margin: 0;
        }
        
        /* Optional: If you want the card to blend in perfectly, 
           set its background to match Quartz's dark mode exactly. 
           Usually Quartz uses #161617 or #111111 */
        .monitor-card {
            background-color: #161617; /* Adjust this hex to match your Quartz theme */
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }
        h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        input {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            width: 140px;
            text-align: center;
            font-family: 'Consolas', monospace;
            outline: none;
        }

        input:focus { border-color: var(--accent-blue); }

        button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: var(--accent-hover); }

        .status-bar {
            background: #212121;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            color: var(--accent-blue);
        }

        .table-container {
            max-height: 450px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: #222;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Consolas', monospace;
            font-size: 13px;
        }

        th {
            position: sticky;
            top: 0;
            background: #333;
            text-align: left;
            color: var(--text-dim);
            padding: 10px 8px;
            z-index: 1;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .ping-cell {
            text-align: right;
            color: var(--success-green);
        }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
        }

        /* Scrollbar Styling */
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="monitor-card">
        <h1>FiveM Player Tracker</h1>

        <div class="controls">
            <input type="text" id="serverInput" placeholder="Server Code" maxlength="6">
            <button onclick="changeServer()">Track Server</button>
        </div>

        <div id="status" class="status-bar">Connecting to internal API...</div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="15%">ID</th>
                        <th width="65%">Player Name</th>
                        <th width="20%" style="text-align: right;">Ping</th>
                    </tr>
                </thead>
                <tbody id="playerList">
                    <tr>
                        <td colspan="3" style="text-align:center; padding:20px; color:#666;">
                            Initializing...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="footer" id="lastUpdated">Waiting for update...</div>
    </div>

    <script>
        let currentCode = "l9yp9v"; // Default server code
        let refreshInterval = null;

        async function updateTracker() {
            if (!currentCode) return;

            const statusEl = document.getElementById('status');
            const listEl = document.getElementById('playerList');
            const footerEl = document.getElementById('lastUpdated');

            // Pointing to your serverless function on blindmouse.au
            const apiEndpoint = `/api/fetchFiveM?code=${currentCode}`;

            try {
                const response = await fetch(apiEndpoint);
                
                if (!response.ok) throw new Error("Internal API Error");

                const json = await response.json();

                if (!json || !json.Data) throw new Error("Invalid Server Data");

                const data = json.Data;
                const players = data.players || [];
                const maxClients = (data.vars && data.vars.sv_maxClients) || "??";

                statusEl.innerText = `Online: ${players.length} / ${maxClients}`;

                // Sort by ID (numerical)
                players.sort((a, b) => parseInt(a.id) - parseInt(b.id));

                if (players.length > 0) {
                    listEl.innerHTML = players.map(p => `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.name.toString().substring(0, 25).replace(/</g, "&lt;")}</td>
                            <td class="ping-cell">${p.ping}ms</td>
                        </tr>
                    `).join('');
                } else {
                    listEl.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:20px;">No players online.</td></tr>`;
                }

                footerEl.innerText = `Server: ${currentCode} | Last updated: ${new Date().toLocaleTimeString()}`;

            } catch (err) {
                console.error("Tracker Error:", err);
                statusEl.innerText = "Status: Connection Error";
                listEl.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:20px; color:var(--error-red);">Could not reach API. Ensure fetchFiveM.js is deployed.</td></tr>`;
            }
        }

        function changeServer() {
            const input = document.getElementById('serverInput').value.trim().toLowerCase();
            if (input.length === 6) {
                currentCode = input;
                document.getElementById('status').innerText = "Switching...";
                updateTracker();

                // Restart interval
                clearInterval(refreshInterval);
                refreshInterval = setInterval(updateTracker, 60000);
            } else {
                alert("Please enter a valid 6-digit FiveM server code.");
            }
        }

        // Setup UI and initial load
        document.getElementById('serverInput').value = currentCode;
        updateTracker();
        
        // Refresh every 60 seconds
        refreshInterval = setInterval(updateTracker, 60000);
    </script>

</body>
</html>
