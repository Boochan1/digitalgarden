<style>
    :root {
        --bg-color: #1a1a1a;
        --container-bg: #2b2b2b;
        --input-bg: #1e1e1e;
        --text-main: #ebebeb;
        --text-dim: #919191;
        --accent-blue: #1f538d;
        --accent-hover: #14375e;
        --border-color: #3f3f3f;
        --success-green: #50fa7b;
    }

    body {
        background-color: var(--bg-color);
        margin: 0;
        padding: 0;
        /* Layout logic for centering */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        
        /* Font Reversion */
        color: var(--text-main);
        font-family: 'Roboto', 'Segoe UI', sans-serif;
    }

    .monitor-card {
        background-color: var(--container-bg);
        width: 95%;
        max-width: 500px;
        border-radius: 10px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border: 1px solid var(--border-color);
    }

    h1 { font-size: 22px; text-align: center; margin-bottom: 20px; }

    .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        justify-content: center;
    }

    input {
        background: var(--input-bg);
        border: 1px solid var(--border-color);
        color: white;
        padding: 8px 12px;
        border-radius: 5px;
        width: 120px;
        text-align: center;
        /* Reverted to Monospace */
        font-family: 'Consolas', 'Courier New', monospace;
    }

    button {
        background: var(--accent-blue);
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        font-family: sans-serif;
    }

    .status-bar {
        background: #212121;
        padding: 10px;
        border-radius: 6px;
        text-align: center;
        font-weight: bold;
        margin-bottom: 15px;
        border: 1px solid var(--border-color);
        color: var(--accent-blue);
    }

    .table-container {
        max-height: 400px;
        overflow-y: auto;
        border: 1px solid var(--border-color);
        border-radius: 5px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        /* Reverted to Monospace for the player list */
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 13px;
    }

    th {
        position: sticky;
        top: 0;
        background: #333;
        text-align: left;
        color: var(--text-dim);
        padding: 10px 5px;
    }

    td {
        padding: 10px 5px;
        border-bottom: 1px solid var(--border-color);
    }

    .ping-cell { text-align: right; color: var(--success-green); }
    
    .footer {
        margin-top: 15px;
        font-size: 11px;
        color: var(--text-dim);
        text-align: center;
        font-family: sans-serif;
    }
</style>
